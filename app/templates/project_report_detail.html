<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shan-AI — דוח פרויקטים {{ report.generated_at }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    :root { --bg-deep:#070b12; --bg-surface:#0c1220; --bg-card:#0f1826; --border:#1a2d47; --cyan:#00d4ff; --text-1:#e2e8f0; --text-2:#64748b; --green:#10b981; --amber:#f59e0b; }
    body { background:var(--bg-deep); color:var(--text-1); font-family:'Heebo',sans-serif; min-height:100vh; }
    .navbar { background:var(--bg-surface); border-bottom:1px solid var(--border); padding:12px 24px; }
    .page-title { color:var(--cyan); font-size:1.2rem; font-weight:700; }
    .btn-outline-dim { border:1px solid var(--border); color:var(--text-2); background:transparent; border-radius:6px; padding:6px 16px; text-decoration:none; display:inline-block; transition:.15s; }
    .btn-outline-dim:hover { color:var(--text-1); border-color:var(--cyan); }
    .btn-cyan   { background:var(--cyan); color:#000; font-weight:700; border:none; border-radius:8px; padding:10px 28px; font-size:1rem; cursor:pointer; text-decoration:none; display:inline-block; transition:.15s; }
    .btn-cyan:hover { opacity:.85; }
    .action-bar { display:flex; gap:12px; align-items:center; padding:20px 24px; background:var(--bg-surface); border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .section-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; margin-bottom:16px; }
    .section-header { padding:14px 20px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:1rem; color:var(--cyan); }
    .section-body { border-top:1px solid var(--border); }
  </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between align-items-center">
  <span class="page-title">📊 דוח {{ report.generated_at }}</span>
  <div class="d-flex gap-2 align-items-center">
    <span style="color:var(--text-2);font-size:.85rem;">{{ current_user.username }}</span>
    <a href="/dashboard/project-reports" class="btn-outline-dim">רשימת דוחות →</a>
    <a href="/logout" class="btn-outline-dim">יציאה</a>
  </div>
</nav>

<!-- Action bar -->
<div class="action-bar">
  <a href="#report-section" class="btn-cyan" onclick="openReport()">
    📄 דוח HTML מלא
  </a>
  <span style="color:var(--text-2);font-size:.8rem;margin-right:auto;">נוצר: {{ report.generated_at }}</span>
</div>

<div class="container-fluid px-4 py-4">

  <!-- HTML report section -->
  <div class="section-card" id="report-section">
    <div class="section-header" onclick="toggleReport()">
      <span>📄 דוח HTML מלא — 10 עמודים</span>
      <span id="rep-arr">▼</span>
    </div>
    <div class="section-body" id="rep-body">
      <iframe id="reportFrame" srcdoc="{{ report.html_content | e }}"
        style="width:100%;height:12000px;border:none;background:#070b12;"
        onload="try{this.style.height=Math.max(4000,this.contentDocument.documentElement.scrollHeight+40)+'px';}catch(e){}">
      </iframe>
    </div>
  </div>

</div>

<script>
function toggleReport() {
  const b = document.getElementById('rep-body');
  const a = document.getElementById('rep-arr');
  const hidden = b.style.display === 'none';
  b.style.display = hidden ? '' : 'none';
  a.textContent   = hidden ? '▼' : '▶';
}
function openReport() {
  const b = document.getElementById('rep-body');
  if (b.style.display === 'none') {
    b.style.display = '';
    document.getElementById('rep-arr').textContent = '▼';
  }
  setTimeout(() => document.getElementById('report-section').scrollIntoView({behavior:'smooth'}), 100);
}
</script>
</body>
</html>
