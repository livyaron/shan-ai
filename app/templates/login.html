<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה - Shan-Ai</title>
    <style>
        /* General Page Background */
        body {
            background-color: #0d1117;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        /* The Dark Card (Container) */
        .login-container {
            background-color: #00020a;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 40px rgba(88, 101, 242, 0.3);
            border: 1px solid rgba(88, 101, 242, 0.2);
        }

        /* Elegant Breathing + Glow Animation */
        @keyframes elegantBreath {
            0%, 100% {
                transform: scale(1);
                opacity: 0.85;
                filter: drop-shadow(0 0 20px rgba(88, 101, 242, 0.2));
            }
            50% {
                transform: scale(1.03);
                opacity: 1;
                filter: drop-shadow(0 0 30px rgba(88, 101, 242, 0.4));
            }
        }

        .logo-img {
            width: 405px;
            height: auto;
            border-radius: 0;
            box-shadow: none;
            filter: drop-shadow(0 0 20px rgba(88, 101, 242, 0.2));
            margin-bottom: 20px;
            animation: elegantBreath 4s ease-in-out infinite;
            cursor: default;
        }

        h2 {
            color: #7d8cc4;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: right;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #8b949e;
        }

        /* Input Styling */
        select, input {
            width: 100%;
            padding: 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        select option {
            background-color: #1a222d;
            color: white;
        }

        /* The Submit Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #5865f2;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #4751d6;
        }

        .login-btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #5865f2;
        }

        .alert {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .alert-danger {
            background-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="/static/logo.png" alt="Shan-Ai Logo" class="logo-img">

        <h2>פלטפורמת קבלת החלטות חכמה</h2>

        {% if error %}
        <div class="alert alert-danger">❌ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>בחר משתמש</label>
                <select name="user_id" required>
                    <option value="">-- בחר משתמש --</option>
                    {% for u in users %}
                    <option value="{{ u.id }}">{{ u.username }}{% if u.job_title %} — {{ u.job_title }}{% endif %}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>סיסמה</label>
                <input type="password" name="password" placeholder="הזן סיסמה" required>
            </div>

            <button type="submit" class="login-btn">כניסה למערכת</button>
        </form>

        <div class="footer-text">
            סיסמה ברירת מחדל: 1234
        </div>
    </div>

</body>
</html>
