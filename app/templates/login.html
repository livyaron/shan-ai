<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה - Shan-AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: #1e2340;
            border: 1px solid #2d3047;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 26px;
            color: #8b9cf4;
            margin-bottom: 6px;
        }
        .login-header p {
            color: #a0a8c0;
            font-size: 13px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            color: #a0a8c0;
            font-size: 13px;
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            background: #2d3047;
            border: 1px solid #3d4060;
            border-radius: 6px;
            color: #e0e6ff;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #8b9cf4;
        }
        select option { background: #2d3047; }
        .login-button {
            width: 100%;
            padding: 12px;
            background: #8b9cf4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .login-button:hover { background: #7a8be3; }
        .error-message {
            background: rgba(255, 100, 100, 0.15);
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ff9a9a;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 18px;
            font-size: 13px;
        }
        .hint {
            text-align: center;
            color: #6a7290;
            font-size: 12px;
            margin-top: 20px;
        }
        .hint strong { color: #8b9cf4; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Shan-AI</h1>
            <p>פלטפורמת קבלת החלטות חכמה</p>
        </div>

        {% if error %}
        <div class="error-message">⚠️ {{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="user_id">בחר משתמש</label>
                <select id="user_id" name="user_id" required autofocus>
                    <option value="">-- בחר משתמש --</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}{% if user.role %} ({{ role_labels.get(user.role.value, user.role.value) }}){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="password">סיסמה</label>
                <input type="password" id="password" name="password" required
                       placeholder="הזן סיסמה">
            </div>
            <button type="submit" class="login-button">כניסה למערכת</button>
        </form>

        <p class="hint">סיסמה ברירת מחדל: <strong>1234</strong></p>
    </div>
</body>
</html>
