<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shan-AI — דוחות פרויקטים</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bg-deep:#070b12; --bg-surface:#0c1220; --bg-card:#0f1826; --border:#1a2d47; --cyan:#00d4ff; --text-1:#e2e8f0; --text-2:#64748b; }
    body { background:var(--bg-deep); color:var(--text-1); font-family:'Heebo',sans-serif; min-height:100vh; }
    .navbar { background:var(--bg-surface); border-bottom:1px solid var(--border); padding:12px 24px; }
    .page-title { color:var(--cyan); font-size:1.3rem; font-weight:700; }
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; }
    .table { color:var(--text-1); }
    .table th { color:var(--text-2); border-color:var(--border); font-size:.8rem; text-transform:uppercase; }
    .table td { border-color:var(--border); vertical-align:middle; }
    .btn-cyan { background:var(--cyan); color:#000; font-weight:600; border:none; border-radius:6px; padding:7px 20px; cursor:pointer; }
    .btn-outline-dim { border:1px solid var(--border); color:var(--text-2); background:transparent; border-radius:6px; padding:6px 16px; text-decoration:none; display:inline-block; }
    .btn-outline-dim:hover { color:var(--text-1); border-color:var(--cyan); }
    .badge-video { background:rgba(0,212,255,.12); color:var(--cyan); font-size:.72rem; padding:2px 8px; border-radius:4px; }
  </style>
</head>
<body>
{% include "_navbar.html" %}

<div class="container-fluid px-4 py-4">
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <span class="page-title">📋 דוחות פרויקטים</span>
    <a href="/dashboard/project-reports/schedule" class="btn-outline-dim">⏰ תזמון אוטומטי</a>
  </div>
  <div class="card p-3">
    {% if reports %}
    <table class="table table-hover mb-0">
      <thead><tr><th>תאריך יצירה</th><th>פעולות</th></tr></thead>
      <tbody>
      {% for r in reports %}
      <tr>
        <td><strong>{{ r.generated_at }}</strong></td>
        <td>
          <div class="d-flex gap-2">
            <a href="/dashboard/project-reports/{{ r.id }}" class="btn-outline-dim" style="font-size:.85rem;">📄 דוח</a>
            <form method="post" action="/dashboard/project-reports/{{ r.id }}/delete"
                  onsubmit="return confirm('למחוק דוח זה?');" style="margin:0;">
              <button type="submit" class="btn-outline-dim" style="color:#ef4444;font-size:.85rem;">🗑</button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
      </tbody>
    </table>
    {% else %}
    <div style="text-align:center;padding:60px 0;color:var(--text-2);">
      <p style="font-size:1.1rem;">אין דוחות עדיין. העלה קובץ פרויקטים כדי לקבל דוח.</p>
    </div>
    {% endif %}
  </div>
</div>
</body>
</html>
