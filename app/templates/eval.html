<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Shan-AI — מחזור אבחון</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070b12; --card: #0f1826; --border: #1a2d47;
            --cyan: #00d4ff; --green: #10b981; --orange: #f59e0b; --red: #ef4444; --purple: #8b9cf4;
            --text: #e2e8f0; --text-2: #64748b;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Heebo', sans-serif; margin: 0; padding: 1rem 1.5rem; }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 0.5rem 0 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
        h1 { color: var(--cyan); font-size: 1.4rem; margin: 0 1rem 0 0; display: inline-block; }
        button { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-family: inherit; }
        button:hover { border-color: var(--cyan); color: var(--cyan); }
        button.primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
        button.primary[disabled] { background: var(--card); color: var(--text-2); border-color: var(--border); cursor: not-allowed; }
        button.danger { color: var(--red); border-color: var(--red); }
        button.danger.hidden { display: none; }
        a.nav { color: var(--cyan); text-decoration: none; margin-inline-end: 1rem; }
        .stats { color: var(--text-2); font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; }
        .stats b { color: var(--green); }
        .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.8rem; padding: 0.8rem 1rem; }
        .question-card.passed_first_try { border-right: 3px solid var(--green); }
        .question-card.fixed { border-right: 3px solid var(--cyan); }
        .question-card.unfixable, .question-card.error { border-right: 3px solid var(--red); }
        .question-card.aborted { border-right: 3px solid var(--orange); }
        .q-title { font-weight: 600; margin-bottom: 0.3rem; }
        .gold { color: var(--green); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .gold::before { content: "🎯 zahav: "; color: var(--text-2); margin-inline-end: 0.3rem; }
        .attempt { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; padding: 0.3rem 0.5rem; border-right: 2px solid var(--border); margin: 0.3rem 0; }
        .attempt.pass { border-color: var(--green); }
        .attempt.fail { border-color: var(--red); }
        .repair { background: rgba(139,156,244,0.06); padding: 0.4rem 0.6rem; margin: 0.3rem 0; border-radius: 4px; font-size: 0.85rem; }
        .repair.applied { background: rgba(16,185,129,0.08); }
        .repair.rejected { background: rgba(239,68,68,0.08); }
        .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 10px; font-size: 0.75rem; margin-inline-end: 0.4rem; }
        .badge.passed_first_try { background: var(--green); color: var(--bg); }
        .badge.fixed { background: var(--cyan); color: var(--bg); }
        .badge.unfixable, .badge.error { background: var(--red); color: var(--bg); }
        .badge.aborted { background: var(--orange); color: var(--bg); }
        pre { background: #050810; color: var(--purple); padding: 0.4rem; border-radius: 4px; font-size: 0.78rem; overflow-x: auto; margin: 0.3rem 0; max-height: 200px; }
        .summary { background: var(--card); border: 1px solid var(--cyan); border-radius: 6px; padding: 1rem; margin: 1rem 0; }
        .summary h2 { margin-top: 0; color: var(--cyan); font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="topbar">
        <div>
            <a class="nav" href="/dashboard">⟵ דשבורד</a>
            <a class="nav" href="/dashboard/eval/curate">🎯 אימות תשובות</a>
            <h1>מחזור אבחון</h1>
            <span class="stats" id="stats">—</span>
        </div>
        <div>
            <button id="run" class="primary">▶ הפעל מחזור</button>
            <button id="abort" class="danger hidden">⏹ עצור</button>
        </div>
    </div>

    <div id="feed"></div>

<script>
const feedEl = document.getElementById("feed");
const statsEl = document.getElementById("stats");
const runBtn = document.getElementById("run");
const abortBtn = document.getElementById("abort");

function setRunning(running) {
    runBtn.disabled = running;
    abortBtn.classList.toggle("hidden", !running);
}

const cards = new Map();   // question_hash -> {root, attemptsBox, repairsBox, statusEl}
let counts = {passed_first_try: 0, fixed: 0, unfixable: 0, error: 0, aborted: 0};
let total = 0;

function ensureCard(qh, question, gold) {
    if (cards.has(qh)) return cards.get(qh);
    const root = document.createElement("div");
    root.className = "question-card";
    root.innerHTML = `
        <div class="q-title">${escapeHtml(question)}</div>
        <div class="gold">${escapeHtml(gold || "")}</div>
        <div class="attempts"></div>
        <div class="repairs"></div>
        <div class="status"></div>
    `;
    feedEl.appendChild(root);
    const entry = {
        root,
        attemptsBox: root.querySelector(".attempts"),
        repairsBox: root.querySelector(".repairs"),
        statusEl: root.querySelector(".status"),
    };
    cards.set(qh, entry);
    return entry;
}

function escapeHtml(s) {
    return (s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
}

function refreshStats() {
    const passed = (counts.passed_first_try || 0) + (counts.fixed || 0);
    statsEl.innerHTML = `<b>${passed}</b>/${total} עברו · קובע: ${counts.fixed||0} · נכשל: ${counts.unfixable||0}`;
}

function applyEvent(ev) {
    if (ev.type === "cycle_triggered") {
        setRunning(true);
    } else if (ev.type === "cycle_start") {
        feedEl.innerHTML = "";
        cards.clear();
        counts = {passed_first_try: 0, fixed: 0, unfixable: 0, error: 0, aborted: 0};
        total = ev.total;
        refreshStats();
        setRunning(true);
    } else if (ev.type === "question_start") {
        ensureCard(ev.question_hash, ev.question, ev.gold);
    } else if (ev.type === "attempt") {
        const c = cards.get(ev.question_hash);
        if (!c) return;
        const div = document.createElement("div");
        div.className = "attempt " + (ev.score >= 0.8 ? "pass" : "fail");
        div.innerHTML = `🤖 ניסיון ${ev.attempt}: <b>${ev.score >= 0.8 ? "✓" : "✗"}</b> ציון ${ev.score.toFixed(2)} — ${escapeHtml(ev.answer)}`;
        c.attemptsBox.appendChild(div);
    } else if (ev.type === "repair_proposed") {
        const c = cards.get(ev.question_hash);
        if (!c) return;
        const div = document.createElement("div");
        div.className = "repair";
        div.dataset.proposalId = ev.proposal_id;
        div.innerHTML = `🔧 הצעת תיקון: <b>${escapeHtml(ev.fix_type)}</b> — ${escapeHtml(ev.rationale || "")}<pre>${escapeHtml(JSON.stringify(ev.patch, null, 2))}</pre>`;
        c.repairsBox.appendChild(div);
    } else if (ev.type === "repair_applied") {
        const c = cards.get(ev.question_hash);
        const el = c && c.repairsBox.querySelector(`[data-proposal-id="${ev.proposal_id}"]`);
        if (el) { el.classList.add("applied"); el.innerHTML += `<div>✅ הוחל</div>`; }
    } else if (ev.type === "repair_rejected") {
        const c = cards.get(ev.question_hash);
        const el = c && c.repairsBox.querySelector(`[data-proposal-id="${ev.proposal_id}"]`);
        if (el) {
            el.classList.add("rejected");
            const regs = ev.regressions && ev.regressions.length ? `רגרסיה ב-${ev.regressions.length} שאלות` : `ציון ${ev.new_score?.toFixed?.(2) ?? '?'}`;
            el.innerHTML += `<div>🚫 נדחה — ${escapeHtml(regs)}</div>`;
        }
    } else if (ev.type === "question_done") {
        const r = ev.result;
        const c = cards.get(r.question_hash);
        if (!c) return;
        c.root.classList.add(r.status);
        c.statusEl.innerHTML = `<span class="badge ${r.status}">${r.status}</span> ניסיונות: ${r.attempts}`;
        counts[r.status] = (counts[r.status] || 0) + 1;
        refreshStats();
    } else if (ev.type === "cycle_done") {
        if (ev.counts) {
            const div = document.createElement("div");
            div.className = "summary";
            const passed = (ev.counts.passed_first_try || 0) + (ev.counts.fixed || 0);
            div.innerHTML = `
                <h2>סיכום מחזור #${ev.eval_run_id}</h2>
                <div>עברו: <b>${passed}/${ev.total}</b> (${(ev.pass_rate*100).toFixed(0)}%)</div>
                <div>עברו ישר: ${ev.counts.passed_first_try||0} · תוקנו: ${ev.counts.fixed||0} · בלתי-פתירים: ${ev.counts.unfixable||0}</div>
                <div>תיקונים שהוחלו: ${ev.applied_fix_ids.length}</div>
            `;
            feedEl.appendChild(div);
        }
        setRunning(false);
    } else if (ev.type === "cycle_error") {
        const div = document.createElement("div");
        div.className = "summary";
        div.style.borderColor = "var(--red)";
        div.innerHTML = `<h2 style="color: var(--red)">המחזור נכשל</h2><pre>${escapeHtml(ev.error || "")}</pre>`;
        feedEl.appendChild(div);
        setRunning(false);
    }
}

const es = new EventSource("/dashboard/eval/stream");
es.onmessage = (msg) => {
    try {
        const ev = JSON.parse(msg.data);
        applyEvent(ev);
    } catch (e) {
        console.error("bad event", e, msg.data);
    }
};

runBtn.onclick = async () => {
    setRunning(true);
    try {
        const r = await fetch("/dashboard/eval/run", {method: "POST"});
        if (!r.ok) {
            const t = await r.text();
            alert("שגיאה: " + t);
            setRunning(false);
        }
    } catch (e) {
        alert("שגיאה: " + e);
        setRunning(false);
    }
};
abortBtn.onclick = async () => {
    abortBtn.disabled = true;
    try {
        await fetch("/dashboard/eval/abort", {method: "POST"});
    } finally {
        abortBtn.disabled = false;
    }
};
</script>
</body>
</html>
